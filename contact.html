<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

<nav class="bg-green-600 text-white p-4 flex justify-between">
  <h1 class="font-bold text-xl">SocialCare</h1>
  <div class="space-x-4">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<main class="min-h-[calc(100vh-72px)] flex items-center justify-center px-4 py-10">
  <section class="w-full max-w-xl bg-white p-8 md:p-10 rounded-xl shadow-lg">
    <h2 class="text-3xl font-bold text-green-700 mb-3 text-center">Contact Us</h2>
    <p class="text-center mb-6">
      Have a question or need support? Send us a message and our team will get back to you soon.
    </p>

    <form class="space-y-4">
      <input type="text" placeholder="Your Name" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
      <input type="email" placeholder="Your Email" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
      <textarea placeholder="Your Message" rows="5" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"></textarea>
      <button class="w-full bg-green-600 text-white px-4 py-3 rounded-lg font-semibold hover:bg-green-700 transition-colors">
        Send Message
      </button>
    </form>
  </section>
</main>

<!-- FOOTER -->
<footer class="bg-gray-800 text-white text-center p-4">
  <p>© 2026 SocialCare.</p>
</footer>

</body>
</html>
